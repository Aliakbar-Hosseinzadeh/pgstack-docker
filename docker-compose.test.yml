services:
  db:
    image: postgres:${POSTGRES_VERSION:-18}
    restart: "no"                  # fail fast in CI if the DB crashes
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      TZ: ${TZ:-UTC}
    # remove the base volume mount
    volumes: []
    # ephemeral, in-memory DB for speed (adjust size as needed)
    tmpfs:
      - /var/lib/postgresql/tmpdata:size=512m,uid=999,gid=999
    # map to a RANDOM host port to avoid conflicts on shared runners/dev laptops
    ports:
      - "0:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "2"
